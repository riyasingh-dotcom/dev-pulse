services:
  backend:
    build:
      context: ./devpulse-backend
      dockerfile: DOCKERFILE
    ports:
      - "3001:3001"
    env_file:
      - ./devpulse-backend/.env
    environment:
      PORT: 3001
    restart: unless-stopped

  frontend:
    build:
      context: ./devpulse-frontend
      dockerfile: DOCKERFILE
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
